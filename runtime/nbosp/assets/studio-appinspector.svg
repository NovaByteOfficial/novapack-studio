<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="94" height="94">
  <defs>
    <linearGradient id="mag-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="mag-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="win-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="48" cy="90" rx="36" ry="6" fill="#000" opacity="0.15"/>
  <!-- window frame (back) -->
  <rect x="6" y="10" width="58" height="48" rx="7" fill="#0284c7" opacity="0.45"/>
  <!-- window face -->
  <rect x="2" y="6" width="58" height="48" rx="7" fill="url(#win-bg)"/>
  <!-- title bar -->
  <rect x="2" y="6" width="58" height="14" rx="7" fill="#0369a1"/>
  <rect x="2" y="13" width="58" height="7" fill="#0369a1"/>
  <circle cx="12" cy="13" r="3.5" fill="#f87171"/>
  <circle cx="23" cy="13" r="3.5" fill="#fbbf24"/>
  <circle cx="34" cy="13" r="3.5" fill="#4ade80"/>
  <!-- content lines -->
  <rect x="10" y="27" width="28" height="4" rx="2" fill="#7dd3fc"/>
  <rect x="10" y="35" width="42" height="3" rx="1.5" fill="#bae6fd" opacity="0.8"/>
  <rect x="10" y="42" width="34" height="3" rx="1.5" fill="#bae6fd" opacity="0.6"/>
  <rect x="10" y="49" width="20" height="3" rx="1.5" fill="#bae6fd" opacity="0.5"/>
  <!-- magnifier handle -->
  <line x1="68" y1="76" x2="84" y2="90" stroke="#0e7490" stroke-width="9" stroke-linecap="round"/>
  <line x1="68" y1="76" x2="84" y2="90" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
  <!-- magnifier ring -->
  <circle cx="50" cy="58" r="26" fill="none" stroke="#0e7490" stroke-width="9"/>
  <circle cx="50" cy="58" r="26" fill="none" stroke="url(#mag-ring)" stroke-width="6"/>
  <!-- glass fill -->
  <circle cx="50" cy="58" r="20" fill="url(#mag-glass)" opacity="0.3"/>
  <!-- shine -->
  <ellipse cx="43" cy="50" rx="7" ry="4.5" fill="#fff" opacity="0.38" transform="rotate(-20 43 50)"/>
</svg>
