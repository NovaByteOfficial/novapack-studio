<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="94" height="94">
  <defs>
    <linearGradient id="chip-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="chip-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="chip-front" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="48" cy="90" rx="36" ry="6" fill="#000" opacity="0.18"/>
  <!-- chip body -->
  <rect x="16" y="20" width="64" height="64" rx="8" fill="url(#chip-top)"/>
  <!-- inner die -->
  <rect x="28" y="32" width="40" height="40" rx="4" fill="url(#chip-front)"/>
  <rect x="34" y="38" width="28" height="28" rx="2" fill="#1e1b4b" opacity="0.75"/>
  <!-- circuit cross -->
  <line x1="48" y1="44" x2="48" y2="60" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="56" y2="52" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="48" cy="52" r="4" fill="#c4b5fd"/>
  <!-- pins top -->
  <rect x="24" y="10" width="6" height="12" rx="2" fill="url(#chip-side)"/>
  <rect x="36" y="10" width="6" height="12" rx="2" fill="url(#chip-side)"/>
  <rect x="48" y="10" width="6" height="12" rx="2" fill="url(#chip-side)"/>
  <rect x="60" y="10" width="6" height="12" rx="2" fill="url(#chip-side)"/>
  <!-- pins bottom -->
  <rect x="24" y="74" width="6" height="12" rx="2" fill="url(#chip-side)"/>
  <rect x="36" y="74" width="6" height="12" rx="2" fill="url(#chip-side)"/>
  <rect x="48" y="74" width="6" height="12" rx="2" fill="url(#chip-side)"/>
  <rect x="60" y="74" width="6" height="12" rx="2" fill="url(#chip-side)"/>
  <!-- pins left -->
  <rect x="4" y="28" width="12" height="6" rx="2" fill="url(#chip-side)"/>
  <rect x="4" y="40" width="12" height="6" rx="2" fill="url(#chip-side)"/>
  <rect x="4" y="52" width="12" height="6" rx="2" fill="url(#chip-side)"/>
  <rect x="4" y="64" width="12" height="6" rx="2" fill="url(#chip-side)"/>
  <!-- pins right -->
  <rect x="80" y="28" width="12" height="6" rx="2" fill="url(#chip-side)"/>
  <rect x="80" y="40" width="12" height="6" rx="2" fill="url(#chip-side)"/>
  <rect x="80" y="52" width="12" height="6" rx="2" fill="url(#chip-side)"/>
  <rect x="80" y="64" width="12" height="6" rx="2" fill="url(#chip-side)"/>
  <!-- highlight -->
  <rect x="16" y="20" width="64" height="16" rx="8" fill="#fff" opacity="0.18"/>
</svg>
