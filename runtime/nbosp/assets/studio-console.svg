<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="94" height="94">
  <defs>
    <linearGradient id="term-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="term-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="term-screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="48" cy="90" rx="36" ry="6" fill="#000" opacity="0.18"/>
  <!-- 3D right side face -->
  <rect x="70" y="10" width="8" height="72" rx="0" fill="url(#term-side)"/>
  <!-- 3D top face -->
  <polygon points="14,6 70,6 78,10 22,10" fill="#166534"/>
  <!-- 3D bottom face -->
  <polygon points="14,78 70,78 78,82 22,82" fill="#14532d"/>
  <!-- main face -->
  <rect x="14" y="6" width="56" height="72" rx="6" fill="url(#term-body)"/>
  <!-- screen -->
  <rect x="20" y="14" width="44" height="56" rx="3" fill="url(#term-screen)"/>
  <!-- prompt lines -->
  <text x="25" y="30" font-family="monospace" font-size="8" fill="#4ade80">▶ npm start</text>
  <text x="25" y="42" font-family="monospace" font-size="8" fill="#86efac">injected ✓</text>
  <!-- cursor -->
  <rect x="25" y="48" width="5" height="8" rx="1" fill="#4ade80" opacity="0.9"/>
  <!-- muted lines -->
  <rect x="25" y="62" width="28" height="2.5" rx="1" fill="#166534"/>
  <rect x="25" y="68" width="18" height="2.5" rx="1" fill="#166534"/>
  <!-- highlight -->
  <rect x="14" y="6" width="56" height="14" rx="6" fill="#fff" opacity="0.12"/>
  <!-- base stand -->
  <rect x="22" y="76" width="42" height="6" rx="3" fill="#15803d"/>
  <rect x="30" y="79" width="26" height="4" rx="2" fill="#14532d"/>
</svg>
